<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codeNXT Control Center</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: -1px;
    }
    .qr-container {
      background: white;
      padding: 40px;
      border-radius: 24px;
      display: inline-block;
      margin-bottom: 40px;
    }
    .qr-container img {
      width: 320px;
      height: 320px;
    }
    .label {
      color: #888;
      font-size: 15px;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="title">CONTROL CENTER</div>
  
  <div class="qr-container">
    <div class="label">SCAN TO JOIN THE SESSION</div>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=https://codenxt.global/#/d/ORD-TEST202373" alt="QR Code">
  </div>

  <div style="margin-top:40px; color:#555; font-size:14px;">
    Order ID: ORD-TEST202373
  </div>
</body>
</html>
